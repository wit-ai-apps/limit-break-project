<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIMIT BREAK PROJECT</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #667085;
      --paper: #f5f7fb;
      --panel: #ffffff;
      --line: #d8dee8;
      --primary: #24796f;
      --primary-dark: #16524b;
      --accent: #b94a48;
      --blue: #2b5d8f;
      --gold: #a86f16;
      --soft: #eef4f3;
      --shadow: 0 14px 36px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    header {
      background: #101820;
      color: #fff;
      border-bottom: 5px solid var(--primary);
      padding: 24px min(5vw, 48px);
    }

    .header-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      max-width: 1220px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #d7dee8;
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 700;
    }

    .role-panel {
      min-width: min(390px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 14px;
    }

    .role-panel h2 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      color: #fff;
    }

    .role-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .role-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      font-weight: 800;
      cursor: pointer;
    }

    main {
      width: min(1220px, calc(100% - 28px));
      margin: 22px auto 48px;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(340px, 0.65fr);
      gap: 18px;
    }

    section, aside, dialog {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    section, aside { padding: 18px; }

    .stack { display: grid; gap: 18px; }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2, h3, p { letter-spacing: 0; }
    h2, h3 { margin: 0; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1rem; }

    .day-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid #c8d9d6;
      color: var(--primary-dark);
      font-weight: 900;
      white-space: nowrap;
    }

    .level {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #253246;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .mission-list {
      display: grid;
      gap: 12px;
    }

    .mission {
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--primary);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .mission.complete {
      border-left-color: #2d8a4e;
      background: #f4fbf6;
    }

    .mission-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .time {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf2f7;
      font-weight: 900;
      color: #344054;
      white-space: nowrap;
    }

    .mission-title {
      margin: 6px 0 0;
      font-size: 1.18rem;
      font-weight: 900;
    }

    .course-line {
      margin: 3px 0 0;
      color: var(--muted);
      font-weight: 700;
    }

    .flow {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .flow span {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 0 9px;
      border-radius: 999px;
      background: #f0f3f7;
      border: 1px solid #e0e6ef;
      font-size: 0.88rem;
      font-weight: 750;
    }

    .teacher-actions {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
    }

    body[data-role="teacher"] .teacher-actions { display: flex; }

    .mission-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    button.warning { background: var(--accent); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .metric strong {
      display: block;
      font-size: 1.65rem;
      line-height: 1;
      color: var(--primary);
    }

    .metric span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .bar-list, .review-list, .log-list, .permission-list {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      gap: 6px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 850;
      color: #344054;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #e9eef5;
    }

    .bar i {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      background: var(--primary);
    }

    .review-card, .log-card, .permission-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fff;
    }

    .review-card strong, .log-card strong, .permission-card strong { display: block; }
    .review-card span, .log-card span, .permission-card span { color: var(--muted); }

    .limited {
      padding: 12px;
      border-radius: 8px;
      background: #fff8eb;
      border: 1px solid #f0d59f;
      color: #754c00;
      font-weight: 750;
    }

    dialog {
      width: min(620px, calc(100% - 24px));
      padding: 0;
    }

    dialog::backdrop { background: rgba(16, 24, 32, 0.45); }

    form {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 900;
    }

    input, select, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      background: #fff;
    }

    .student-only, .teacher-only, .parent-only, .supporter-only { display: none; }
    body[data-role="student"] .student-only { display: block; }
    body[data-role="teacher"] .teacher-only { display: block; }
    body[data-role="parent"] .parent-only { display: block; }
    body[data-role="supporter"] .supporter-only { display: block; }

    @media (max-width: 920px) {
      .header-grid, main { grid-template-columns: 1fr; }
      .role-panel { min-width: 0; }
      .progress-grid, .form-grid { grid-template-columns: 1fr; }
      .mission-head { grid-template-columns: 1fr; }
      .time { width: fit-content; }
    }
  </style>
</head>
<body data-role="student">
  <header>
    <div class="header-grid">
      <div>
        <h1>LIMIT BREAK PROJECT</h1>
        <p class="subtitle">Every Day, Beyond Yesterday.</p>
      </div>
      <div class="role-panel" aria-labelledby="role-heading">
        <h2 id="role-heading">ログイン種別を選択</h2>
        <div class="role-options" id="roleOptions"></div>
      </div>
    </div>
  </header>

  <main>
    <div class="stack">
      <section aria-labelledby="mission-heading">
        <div class="topline">
          <div>
            <span class="day-badge" id="dayBadge">DAY 001</span>
            <span class="level" id="levelLabel">LEVEL 1 FOUNDATION</span>
          </div>
          <span class="day-badge" id="dateLabel"></span>
        </div>
        <div class="topline">
          <h2 id="mission-heading">Today&apos;s Mission</h2>
          <button class="secondary" id="exportCsvButton" type="button">CSV出力</button>
        </div>
        <div class="mission-list" id="missionList"></div>
      </section>

      <section aria-labelledby="review-heading">
        <div class="topline">
          <h2 id="review-heading">Review Mission</h2>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>
    </div>

    <aside class="stack" aria-label="進捗と権限">
      <section aria-labelledby="progress-heading">
        <div class="topline">
          <h2 id="progress-heading">今日の進行バー</h2>
        </div>
        <div class="progress-grid">
          <div class="metric"><strong id="todayRate">0%</strong><span>今日のMission達成率</span></div>
          <div class="metric"><strong id="remainingCount">0</strong><span>残りMission数</span></div>
          <div class="metric"><strong id="recordCount">0</strong><span>確認テスト記録</span></div>
        </div>
        <div class="bar-list" id="subjectBars" style="margin-top: 14px;"></div>
      </section>

      <section aria-labelledby="role-view-heading">
        <div class="topline">
          <h2 id="role-view-heading">Role View</h2>
        </div>
        <div class="permission-list" id="permissionList"></div>
      </section>

      <section aria-labelledby="records-heading">
        <div class="topline">
          <h2 id="records-heading">Recent Records</h2>
        </div>
        <div class="log-list" id="logList"></div>
        <button class="warning student-only teacher-only" id="resetButton" type="button" style="width: 100%; margin-top: 12px;">検証データをリセット</button>
      </section>
    </aside>
  </main>

  <dialog id="recordDialog">
    <form method="dialog" id="recordForm">
      <div class="topline">
        <h2>確認テスト入力</h2>
        <button class="secondary" type="button" id="closeDialogButton">閉じる</button>
      </div>
      <input type="hidden" id="missionId">
      <div class="field">
        <label for="missionTitle">ミッション</label>
        <input id="missionTitle" readonly>
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="testType">テスト種別</label>
          <select id="testType" required>
            <option value="初回確認テスト">初回確認テスト</option>
            <option value="翌日確認テスト">翌日確認テスト</option>
            <option value="3日後確認テスト">3日後確認テスト</option>
            <option value="7日後確認テスト">7日後確認テスト</option>
          </select>
        </div>
        <div class="field">
          <label for="score">点数</label>
          <input id="score" type="number" min="0" max="100" step="1" required>
        </div>
        <div class="field">
          <label for="understanding">理解度</label>
          <select id="understanding" required>
            <option value="5">5: 自力で説明できる</option>
            <option value="4">4: ほぼ理解</option>
            <option value="3">3: 要復習</option>
            <option value="2">2: かなり不安</option>
            <option value="1">1: 基礎から</option>
          </select>
        </div>
        <div class="field">
          <label for="fatigue">疲労度</label>
          <select id="fatigue" required>
            <option value="1">1: 余裕</option>
            <option value="2">2: 普通</option>
            <option value="3">3: やや疲れ</option>
            <option value="4">4: 疲れた</option>
            <option value="5">5: 限界近い</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="mistakeReason">間違えた理由</label>
        <textarea id="mistakeReason" placeholder="計算ミス、読み違い、暗記不足、条件整理不足など"></textarea>
      </div>
      <div class="field student-only teacher-only">
        <label for="privateNote">本人だけの内省メモ</label>
        <textarea id="privateNote" placeholder="今日の自分に残すメモ。保護者・サポーター画面には表示しません。"></textarea>
      </div>
      <div class="form-actions">
        <button class="secondary" type="button" id="deleteRecordButton">記録を削除</button>
        <button type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = "limitBreakProjectRecordsV110";
    const ROLE_KEY = "limitBreakProjectRole";

    const ROLES = {
      student: {
        label: "本人",
        headline: "今日やることが分かり、終わると達成感が残る画面です。",
        canEditRecord: true,
        showScore: true,
        showFatigue: true,
        showMistake: true,
        showPrivateNote: true,
        showMissionDetail: true
      },
      parent: {
        label: "保護者",
        headline: "努力量と達成率を見守る画面です。細かい内省メモは表示しません。",
        canEditRecord: false,
        showScore: "summary",
        showFatigue: "summary",
        showMistake: false,
        showPrivateNote: false,
        showMissionDetail: true
      },
      supporter: {
        label: "サポーター",
        headline: "応援に必要な努力量だけを見る画面です。詳細な成績や疲労度は表示しません。",
        canEditRecord: false,
        showScore: false,
        showFatigue: false,
        showMistake: false,
        showPrivateNote: false,
        showMissionDetail: false
      },
      teacher: {
        label: "塾講師",
        headline: "復習漏れ、点数、理解度、疲労度、間違い理由を見て次週方針を作る画面です。",
        canEditRecord: true,
        showScore: true,
        showFatigue: true,
        showMistake: true,
        showPrivateNote: true,
        showMissionDetail: true
      }
    };

    const FALLBACK_DAILY = {
      day: 1,
      date: "2026-07-01",
      level: "LEVEL 1 FOUNDATION",
      missions: [
        {
          id: "day001-math1-part1",
          time: "09:00 - 12:00",
          subject: "数学Ⅰ",
          course: "ベーシックレベル数学Ⅰ",
          lesson: "第1講",
          part: "PART1",
          title: "単項式と多項式",
          tasks: ["要点整理", "Point Pickup", "講義問題", "自力演習", "確認問題", "間違い分析"]
        },
        {
          id: "day001-english-ch1",
          time: "14:00 - 17:00",
          subject: "英語",
          course: "ベーシックレベル英語",
          lesson: "第1講",
          part: "Chapter1",
          title: "肯定文・否定文",
          tasks: ["授業", "復習", "復習テスト", "例文暗唱", "音読"]
        },
        {
          id: "day001-physics-part1",
          time: "20:00 - 22:00",
          subject: "物理基礎",
          course: "ベーシックレベル物理基礎",
          lesson: "第1講",
          part: "PART1",
          title: "速さ",
          tasks: ["講義", "演習問題", "確認テスト", "図解説明", "公式説明"]
        }
      ],
      review_missions: [
        { label: "昨日の復習", subject: "数学Ⅰ", lesson: "第1講", part: "PART1", title: "単項式と多項式" },
        { label: "3日後復習", subject: "英語", lesson: "第1講", part: "Chapter1", title: "肯定文・否定文" },
        { label: "7日後復習", subject: "物理基礎", lesson: "第1講", part: "PART1", title: "速さ" }
      ]
    };

    let dailyPlan = FALLBACK_DAILY;
    let currentRole = localStorage.getItem(ROLE_KEY) || "student";
    let records = loadRecords();

    const roleOptions = document.querySelector("#roleOptions");
    const missionList = document.querySelector("#missionList");
    const reviewList = document.querySelector("#reviewList");
    const subjectBars = document.querySelector("#subjectBars");
    const permissionList = document.querySelector("#permissionList");
    const logList = document.querySelector("#logList");
    const recordDialog = document.querySelector("#recordDialog");
    const recordForm = document.querySelector("#recordForm");

    async function init() {
      renderRoleOptions();
      try {
        const response = await fetch("data/daily_missions.json", { cache: "no-store" });
        if (response.ok) dailyPlan = await response.json();
      } catch (_) {
        dailyPlan = FALLBACK_DAILY;
      }
      render();
    }

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch (_) {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function todayKey() {
      return dailyPlan.date || new Date().toISOString().slice(0, 10);
    }

    function renderRoleOptions() {
      roleOptions.innerHTML = "";
      Object.entries(ROLES).forEach(([key, role]) => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="radio" name="role" value="${key}" ${key === currentRole ? "checked" : ""}> ${role.label}`;
        label.querySelector("input").addEventListener("change", () => {
          currentRole = key;
          localStorage.setItem(ROLE_KEY, currentRole);
          render();
        });
        roleOptions.appendChild(label);
      });
    }

    function render() {
      document.body.dataset.role = currentRole;
      document.querySelector("#dayBadge").textContent = `DAY ${String(dailyPlan.day).padStart(3, "0")}`;
      document.querySelector("#levelLabel").textContent = dailyPlan.level;
      document.querySelector("#dateLabel").textContent = dailyPlan.date;
      renderMissions();
      renderProgress();
      renderReviews();
      renderPermissions();
      renderLogs();
    }

    function getMissionRecord(missionId) {
      return records.find((record) => record.date === todayKey() && record.missionId === missionId);
    }

    function visibleMissionTitle(mission) {
      if (ROLES[currentRole].showMissionDetail) return `${mission.lesson} ${mission.part} / ${mission.title}`;
      return `${mission.subject} / ${mission.time}`;
    }

    function renderMissions() {
      const role = ROLES[currentRole];
      missionList.innerHTML = "";
      dailyPlan.missions.forEach((mission) => {
        const record = getMissionRecord(mission.id);
        const card = document.createElement("article");
        card.className = `mission${record ? " complete" : ""}`;
        const tasks = role.showMissionDetail ? mission.tasks : ["Mission達成率", "努力量", "応援メッセージ"];
        card.innerHTML = `
          <div class="mission-head">
            <div>
              <span class="time">${mission.time}</span>
              <div class="mission-title">${mission.subject} ${visibleMissionTitle(mission)}</div>
              <div class="course-line">${role.showMissionDetail ? mission.course : "詳細な成績情報は非表示"}</div>
            </div>
            <span class="level">${record ? "Mission Clear" : "Today&apos;s Mission"}</span>
          </div>
          <div class="flow">${tasks.map((task) => `<span>${task}</span>`).join("")}</div>
          <div class="mission-actions">
            <button type="button" class="record-button" ${role.canEditRecord ? "" : "disabled"}>${record ? "確認テストを編集" : "確認テスト入力"}</button>
            <div class="teacher-actions">
              <button type="button" class="secondary">復習追加</button>
              <button type="button" class="secondary">次週方針</button>
            </div>
          </div>
        `;
        const button = card.querySelector(".record-button");
        button.addEventListener("click", () => openRecordDialog(mission, record));
        missionList.appendChild(card);
      });
    }

    function renderProgress() {
      const missionTotal = dailyPlan.missions.length;
      const cleared = dailyPlan.missions.filter((mission) => getMissionRecord(mission.id)).length;
      const rate = missionTotal ? Math.round((cleared / missionTotal) * 100) : 0;
      document.querySelector("#todayRate").textContent = `${rate}%`;
      document.querySelector("#remainingCount").textContent = String(Math.max(0, missionTotal - cleared));
      document.querySelector("#recordCount").textContent = String(records.length);
      subjectBars.innerHTML = "";
      const subjects = [...new Set(dailyPlan.missions.map((mission) => mission.subject))];
      subjects.forEach((subject) => {
        const missions = dailyPlan.missions.filter((mission) => mission.subject === subject);
        const done = missions.filter((mission) => getMissionRecord(mission.id)).length;
        const subjectRate = missions.length ? Math.round((done / missions.length) * 100) : 0;
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <div class="bar-label"><span>${subject}</span><span>${subjectRate}%</span></div>
          <div class="bar"><i style="--value: ${subjectRate}%"></i></div>
        `;
        subjectBars.appendChild(row);
      });
    }

    function renderReviews() {
      reviewList.innerHTML = "";
      dailyPlan.review_missions.forEach((review) => {
        const card = document.createElement("div");
        card.className = "review-card";
        card.innerHTML = `<strong>${review.label}</strong><span>${review.subject} ${review.lesson} ${review.part}</span><div>${review.title}</div>`;
        reviewList.appendChild(card);
      });
    }

    function renderPermissions() {
      const role = ROLES[currentRole];
      permissionList.innerHTML = `
        <div class="permission-card"><strong>${role.label}ログイン</strong><span>${role.headline}</span></div>
        <div class="permission-card"><strong>表示</strong><span>${permissionText(role)}</span></div>
      `;
      if (currentRole === "parent") {
        permissionList.innerHTML += `<div class="limited">本人だけの内省メモと、過度にプレッシャーになる情報は表示しません。</div>`;
      }
      if (currentRole === "supporter") {
        permissionList.innerHTML += `<div class="limited">詳細な成績、疲労度、個人メモは表示しません。応援に必要な情報だけを表示します。</div>`;
      }
    }

    function permissionText(role) {
      const items = [];
      items.push(role.showMissionDetail ? "今日のMission詳細" : "Mission達成率");
      if (role.showScore === true) items.push("点数");
      if (role.showScore === "summary") items.push("点数推移の要約");
      if (role.showFatigue === true) items.push("疲労度");
      if (role.showFatigue === "summary") items.push("疲労傾向");
      if (role.showMistake) items.push("間違い理由");
      if (role.showPrivateNote) items.push("内省メモ");
      return items.join(" / ");
    }

    function renderLogs() {
      const role = ROLES[currentRole];
      logList.innerHTML = "";
      if (!records.length) {
        logList.innerHTML = `<div class="empty">まだ記録がありません。</div>`;
        return;
      }
      [...records].sort((a, b) => b.savedAt.localeCompare(a.savedAt)).slice(0, 10).forEach((record) => {
        const card = document.createElement("div");
        card.className = "log-card";
        const scoreLine = role.showScore === true
          ? `点数 ${record.score} / 理解度 ${record.understanding}`
          : role.showScore === "summary"
            ? `確認テスト: 記録あり`
            : `努力記録: 完了`;
        const fatigueLine = role.showFatigue === true ? `疲労度 ${record.fatigue}` : "";
        const mistakeLine = role.showMistake && record.mistakeReason ? `<div>間違い理由: ${record.mistakeReason}</div>` : "";
        const privateLine = role.showPrivateNote && record.privateNote ? `<div>内省メモ: ${record.privateNote}</div>` : "";
        card.innerHTML = `
          <strong>${record.date} / ${record.missionTitle}</strong>
          <span>${record.testType} / ${scoreLine}${fatigueLine ? " / " + fatigueLine : ""}</span>
          ${mistakeLine}
          ${privateLine}
        `;
        logList.appendChild(card);
      });
    }

    function openRecordDialog(mission, record) {
      if (!ROLES[currentRole].canEditRecord) return;
      document.querySelector("#missionId").value = mission.id;
      document.querySelector("#missionTitle").value = `${mission.subject} ${mission.lesson} ${mission.part} ${mission.title}`;
      document.querySelector("#testType").value = record ? record.testType : "初回確認テスト";
      document.querySelector("#score").value = record ? record.score : "";
      document.querySelector("#understanding").value = record ? record.understanding : "4";
      document.querySelector("#fatigue").value = record ? record.fatigue : "2";
      document.querySelector("#mistakeReason").value = record ? record.mistakeReason : "";
      document.querySelector("#privateNote").value = record ? record.privateNote : "";
      document.querySelector("#deleteRecordButton").style.display = record ? "inline-flex" : "none";
      recordDialog.showModal();
    }

    recordForm.addEventListener("submit", () => {
      const missionId = document.querySelector("#missionId").value;
      const mission = dailyPlan.missions.find((item) => item.id === missionId);
      records = records.filter((record) => !(record.date === todayKey() && record.missionId === missionId));
      records.push({
        date: todayKey(),
        day: dailyPlan.day,
        missionId,
        missionTitle: document.querySelector("#missionTitle").value,
        subject: mission ? mission.subject : "",
        course: mission ? mission.course : "",
        lesson: mission ? mission.lesson : "",
        part: mission ? mission.part : "",
        testType: document.querySelector("#testType").value,
        score: document.querySelector("#score").value,
        understanding: document.querySelector("#understanding").value,
        fatigue: document.querySelector("#fatigue").value,
        mistakeReason: document.querySelector("#mistakeReason").value.trim(),
        privateNote: document.querySelector("#privateNote").value.trim(),
        savedAt: new Date().toISOString()
      });
      saveRecords();
      render();
    });

    document.querySelector("#closeDialogButton").addEventListener("click", () => recordDialog.close());
    document.querySelector("#deleteRecordButton").addEventListener("click", () => {
      const missionId = document.querySelector("#missionId").value;
      records = records.filter((record) => !(record.date === todayKey() && record.missionId === missionId));
      saveRecords();
      recordDialog.close();
      render();
    });

    document.querySelector("#resetButton").addEventListener("click", () => {
      if (!confirm("検証データをリセットしますか？")) return;
      records = [];
      saveRecords();
      render();
    });

    document.querySelector("#exportCsvButton").addEventListener("click", () => {
      const headers = ["date", "day", "missionId", "missionTitle", "subject", "course", "lesson", "part", "testType", "score", "understanding", "fatigue", "mistakeReason", "privateNote", "savedAt"];
      const rows = [headers, ...records.map((record) => headers.map((key) => record[key] || ""))];
      const csv = rows.map((row) => row.map(escapeCsv).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `limit-break-records-${todayKey()}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    });

    function escapeCsv(value) {
      const text = String(value).replaceAll('"', '""');
      return /[",\n]/.test(text) ? `"${text}"` : text;
    }

    init();
  </script>
</body>
</html>
